services:
  nginx:
    image: nginx:alpine
    container_name: nginx-balancer
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - backend1
      - backend2
      - backend3
      - backend4

  backend1:
    build: ./backend
    container_name: backend-1
    environment:
      - PORT=3000
      - SERVER_ID=backend-1
    networks:
      - app-network
    expose:
      - "3000"

  backend2:
    build: ./backend
    container_name: backend-2
    environment:
      - PORT=3000
      - SERVER_ID=backend-2
    networks:
      - app-network
    expose:
      - "3000"

  backend3:
    build: ./backend
    container_name: backend-3
    environment:
      - PORT=3000
      - SERVER_ID=backend-3
    networks:
      - app-network
    expose:
      - "3000"

  backend4:
    build: ./backend
    container_name: backend-4-backup
    environment:
      - PORT=3000
      - SERVER_ID=backend-4-backup
    networks:
      - app-network
    expose:
      - "3000"

networks:
  app-network:
    driver: bridge
